name: "Feature / 新機能"
description: "新機能や実装タスクの提案 (1 Issue = 1 AI implementation = 1 PR)"
title: "[Feature] <短い要約>"
labels:
  - "feature"
  - "priority:med"
  - "scope:medium"
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Issue
        目的・背景・入出力を明確に書くことで、AIエージェントが迷わず実装できます。
        AIは「1 Issue = 1 AI implementation = 1 PR」の原則に基づき、タスクが大きすぎる場合は分割を提案してください。

  - type: markdown
    attributes:
      value: |
        ## ブランチ運用
        AIエージェントが作業するブランチを指定します。未定なら空欄でもOKで、あとからコメント等で指定できます。

  - type: input
    id: base_branch
    attributes:
      label: "Base branch"
      description: "作業ブランチの元となる親ブランチ名を指定します。"
      placeholder: "例: feature/<topic-name>"

  - type: input
    id: branch_name
    attributes:
      label: "Branch name"
      description: "AIが作成する作業ブランチ名を指定します。"
      placeholder: "例: feature/123-new-feature"

  - type: input
    id: pr_base
    attributes:
      label: "PR base"
      description: "PRの向き先となるブランチ（通常はBase branchと同じ）"
      placeholder: "例: feature/<topic-name>"

  - type: textarea
    id: dependencies
    attributes:
      label: "Dependencies / Blocked by（依存関係）"
      description: "このIssueに着手するために完了している必要があるIssue番号など。"
      placeholder: "例: Closes #100, Depends on #101"
    validations:
      required: false

  - type: textarea
    id: goal
    attributes:
      label: "Goal（このIssueで達成したいこと）"
      description: "最終的に達成したい成果を簡潔に記述。"
      placeholder: "例: input.wav を処理して out/ に MIDI を生成できるようにする"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: "Background / Context（なぜ必要か）"
      description: "背景・課題・前提を記述。"
      placeholder: "例: 現状は手作業で前処理しているため再現性が低い"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Scope（In / Out）"
      description: "このIssueでやること／やらないことを明確に。"
      placeholder: |
        In:
        - Demucs を呼び出して vocals.wav / piano.wav を生成
        Out:
        - 学習やモデル改良
        - GUI対応
    validations:
      required: true

  - type: textarea
    id: io
    attributes:
      label: "Inputs / Outputs（入出力仕様）"
      description: "入力と出力（ファイル名・形式・ディレクトリ）を明記。"
      placeholder: |
        Input:
        - input.wav (44.1kHz stereo)
        Output:
        - out/separated/vocals.wav
        - out/separated/piano.wav
    validations:
      required: true

  - type: textarea
    id: cli
    attributes:
      label: "CLI usage example（想定コマンド）"
      description: "実行例（CLI名は仮でOK）。"
      placeholder: |
        utacopy run input.wav --out out/ --steps separate
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: "Acceptance Criteria（完了条件）"
      description: "機械的に判定できるDone条件。"
      placeholder: |
        - コマンドが exit code 0 で終了する
        - out/separated/vocals.wav と out/separated/piano.wav が生成され再生できる
        - README に実行手順が追記されている
    validations:
      required: true

  - type: textarea
    id: verification_plan
    attributes:
      label: "Verification Plan（検証計画）"
      description: "AIエージェントが修正・実装をどのように検証するかを記述。"
      placeholder: "例: `pytest tests/test_demucs.py` を実行し、全テストがパスすることを確認する。"
    validations:
      required: true

  - type: textarea
    id: implementation_notes
    attributes:
      label: "Implementation Notes（実装メモ）"
      description: "設計方針、ライブラリ、注意点など。"
      placeholder: |
        - subprocess で demucs を呼び出す
        - 同一入力ならスキップできるオプションがあると良い
    validations:
      required: false

  - type: textarea
    id: completion_note
    attributes:
      label: "Completion Note（完了報告）"
      description: "AIエージェントは作業完了時に、実施内容、検証結果、および後続作業への申し送り事項をここに記入してください。"
      placeholder: |
        ## 実施内容
        - xxx を実装しました。
        ## 検証結果
        - xxx のテストがパスしました。
        ## 申し送り事項
        - 次のIssueでは xxx を行う必要があります。
    validations:
      required: false
